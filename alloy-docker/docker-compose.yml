# =============================================================================
# Docker Compose — Monitoring Agent Stack (Laravel App EC2)
# =============================================================================
# Deploys the observability agent (Grafana Alloy) as a Docker container
# on each Laravel EC2 instance.
#
# WHAT THIS DOES:
#   - Runs Alloy in Docker to collect logs, metrics, and traces
#   - Leaves your Laravel app (Nginx, PHP-FPM) running natively via systemctl
#   - If monitoring breaks: `docker compose down` — app is completely unaffected
#
# WHAT THIS DOES NOT DO:
#   - Does NOT containerize Nginx, PHP-FPM, or your Laravel app
#   - Does NOT require any changes to your application code
#
# PREREQUISITES:
#   - Docker and Docker Compose installed on the Laravel EC2
#   - Nginx stub_status enabled (port 8080)
#   - PHP-FPM pm.status_path enabled
#   - OpenTelemetry packages installed in Laravel (for traces)
#
# IMPORTANT: Before running, edit config.alloy to set:
#   1. LGTM_SERVER_PRIVATE_IP → your LGTM server's private IP
#   2. instance = "laravel-app-1" → unique name per EC2
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Grafana Alloy — Unified Collector Agent
  # ---------------------------------------------------------------------------
  # Collects logs, system metrics (built-in), and traces from the host.
  # Uses host networking so it can access localhost endpoints.
  # Nginx and PHP-FPM metrics come from lightweight sidecar exporters below.
  # ---------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.8.3
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    network_mode: host
    pid: host
    volumes:
      # Alloy configuration
      - ./config.alloy:/etc/alloy/config.alloy:ro
      # Host filesystem access for system metrics (replaces Node Exporter)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      # Laravel log files (read-only)
      - /data/sso-api/storage/logs:/data/sso-api/storage/logs:ro
      # Nginx and PHP-FPM logs (read-only)
      - /var/log/nginx:/var/log/nginx:ro
      - /var/log:/var/log:ro
      # Persistent storage for Alloy's WAL (Write-Ahead Log)
      - alloy-data:/var/lib/alloy/data
    environment:
      - HOSTNAME=${HOSTNAME:-laravel-app}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "grep -q ':3039' /proc/net/tcp6 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - nginx-exporter
      - phpfpm-exporter

  # ---------------------------------------------------------------------------
  # Nginx Prometheus Exporter — Converts stub_status to Prometheus metrics
  # ---------------------------------------------------------------------------
  # Reads Nginx stub_status from 127.0.0.1:8080/nginx_status and exposes
  # Prometheus metrics on :9113/metrics. Alloy scrapes this endpoint.
  # ---------------------------------------------------------------------------
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4
    container_name: nginx-exporter
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://127.0.0.1:8080/nginx_status
    network_mode: host

  # ---------------------------------------------------------------------------
  # PHP-FPM Prometheus Exporter — Converts fpm-status to Prometheus metrics
  # ---------------------------------------------------------------------------
  # Reads PHP-FPM status from 127.0.0.1:8080/fpm-status and exposes
  # Prometheus metrics on :9253/metrics. Alloy scrapes this endpoint.
  # ---------------------------------------------------------------------------
  phpfpm-exporter:
    image: hipages/php-fpm_exporter:2
    container_name: phpfpm-exporter
    restart: unless-stopped
    environment:
      - PHP_FPM_SCRAPE_URI=http://127.0.0.1:8080/fpm-status
    network_mode: host

volumes:
  alloy-data:
