# =============================================================================
# Tempo Configuration — Single-Binary Mode with S3 Backend
# =============================================================================
# Grafana Tempo v2.x configuration for distributed tracing.
# Accepts OTLP traces and stores them in S3.
# =============================================================================

server:
  http_listen_port: 3200
  grpc_listen_port: 9097
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 30s
  max_block_bytes: 5000000 # 5 MB
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 100d # Matches S3 lifecycle
  ring:
    kvstore:
      store: inmemory

storage:
  trace:
    backend: s3
    s3:
      endpoint: s3.ap-southeast-1.amazonaws.com # Change to your region
      bucket: oneone-grafana-bucket
      region: ap-southeast-1 # Change to your region
      # IAM Instance Profile is used — no keys needed.
      prefix: tempo-traces
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true
  processor:
    service_graphs:
      dimensions:
        - service.namespace
    span_metrics:
      dimensions:
        - service.namespace

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics

analytics:
  reporting_enabled: false
