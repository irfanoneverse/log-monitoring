# =============================================================================
# Loki Configuration — Single-Binary Mode with S3 Backend
# =============================================================================
# Loki v3.x configuration for centralized log aggregation.
# Uses S3 for chunk and index storage, TSDB for the index type.
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  replication_factor: 1
  storage:
    s3:
      endpoint: s3.ap-southeast-1.amazonaws.com # Change to your region
      bucketnames: oneone-grafana-bucket
      region: ap-southeast-1 # Change to your region
      # access_key_id and secret_access_key are NOT set here.
      # Loki uses the IAM Instance Profile attached to the EC2 instance.
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache

limits_config:
  retention_period: 100d # Matches S3 lifecycle
  max_query_series: 5000
  max_query_parallelism: 2
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 15MB

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: s3

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

analytics:
  reporting_enabled: false
