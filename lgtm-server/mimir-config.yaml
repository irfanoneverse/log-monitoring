# =============================================================================
# Mimir Configuration — Single-Binary Mode with S3 Backend
# =============================================================================
# Grafana Mimir v2.x configuration for centralized metrics storage.
# Accepts Prometheus remote_write and stores TSDB blocks in S3.
# =============================================================================

target: all

multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: info

common:
  storage:
    backend: s3
    s3:
      endpoint: s3.ap-southeast-1.amazonaws.com # Change to your region
      bucket_name: oneone-grafana-bucket
      region: ap-southeast-1 # Change to your region
      # IAM Instance Profile is used for authentication — no keys needed.

distributor:
  ring:
    kvstore:
      store: memberlist

ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

blocks_storage:
  storage_prefix: mimir-blocks
  tsdb:
    dir: /data/mimir/tsdb
  bucket_store:
    sync_dir: /data/mimir/tsdb-sync

compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

ruler:
  rule_path: /data/mimir/rules
  alertmanager_url: http://localhost:9009/alertmanager

alertmanager:
  data_dir: /data/mimir/alertmanager
  fallback_config_file: /etc/mimir/alertmanager-fallback-config.yaml

limits:
  max_global_series_per_user: 1500000
  ingestion_rate: 50000
  ingestion_burst_size: 100000

memberlist:
  join_members:
    - localhost:7946

analytics:
  reporting_enabled: false
